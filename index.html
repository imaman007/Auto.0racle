<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CarValue - Indian Used Car Predictor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <header>
      <h1>CarValue</h1>
      <p>Pure JS Price Predictor for the Indian Market</p>
    </header>

    <div id="state-idle" class="card form-section">
      <div class="grid-form">
        <div class="input-group">
          <label for="brand">Brand (e.g. Maruti, Hyundai)</label>
          <input type="text" id="brand" placeholder="Enter car brand..." autocomplete="off">
        </div>

        <div class="input-group">
          <label for="year">Manufacturing Year</label>
          <input type="number" id="year" placeholder="e.g. 2018" min="1990" max="2026">
        </div>

        <div class="input-group">
          <label for="km">Kilometers Driven</label>
          <input type="number" id="km" placeholder="e.g. 45000">
        </div>

        <div class="input-group">
          <label for="engine">Engine CC</label>
          <input type="number" id="engine" placeholder="e.g. 1197">
        </div>

        <div class="input-group">
          <label for="fuel">Fuel Type</label>
          <select id="fuel">
            <option value="" disabled selected>Select Fuel</option>
            <option value="Petrol">Petrol</option>
            <option value="Diesel">Diesel</option>
            <option value="CNG">CNG</option>
            <option value="LPG">LPG</option>
            <option value="Electric">Electric</option>
          </select>
        </div>

        <div class="input-group">
          <label for="trans">Transmission</label>
          <select id="trans">
            <option value="" disabled selected>Select Trans</option>
            <option value="Manual">Manual</option>
            <option value="Automatic">Automatic</option>
          </select>
        </div>

        <div class="input-group">
          <label for="owner">Ownership</label>
          <select id="owner">
            <option value="" disabled selected>Select Owner</option>
            <option value="First Owner">First Owner</option>
            <option value="Second Owner">Second Owner</option>
            <option value="Third Owner">Third Owner</option>
            <option value="Fourth & Above Owner">Fourth & Above Owner</option>
            <option value="Test Drive Car">Test Drive Car</option>
          </select>
        </div>

        <div class="input-group">
          <label for="seller">Seller Type</label>
          <select id="seller">
            <option value="" disabled selected>Select Seller</option>
            <option value="Individual">Individual</option>
            <option value="Dealer">Dealer</option>
            <option value="Trustmark Dealer">Trustmark Dealer</option>
          </select>
        </div>
      </div>

      <button onclick="predict()" class="btn-primary">Calculate Value</button>
    </div>

    <div id="state-error" class="card hidden">
      <h3 class="error-text">Incomplete Details</h3>
      <p id="err-msg"></p>
      <button onclick="reset()" class="btn-secondary">Go Back</button>
    </div>

    <div id="state-result" class="card hidden">
      <div class="price-hero">
        <h2>Estimated Fair Value</h2>
        <div id="out-price" class="huge-price">₹ 0</div>
        <div id="out-range" class="subtitle-range">Range: ₹ 0 - ₹ 0</div>
      </div>

      <div class="bar-container">
        <div class="bar-bg" id="bar-high"></div>
        <div class="bar-bg fill-mid" id="bar-mid"></div>
        <div class="bar-bg fill-low" id="bar-low"></div>
        <div class="bar-labels">
          <span id="val-low">Low</span>
          <span id="val-mid">Mid</span>
          <span id="val-high">High</span>
        </div>
      </div>

      <div class="factors-section">
        <h3>Valuation Breakdown</h3>
        <div id="factors-list"></div>
      </div>

      <p id="out-brand-avg" class="brand-avg-text"></p>
      
      <button onclick="reset()" class="btn-secondary">Calculate Another</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
